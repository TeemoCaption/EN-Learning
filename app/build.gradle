plugins {
    id "com.android.application"
}

def configuredWordApiBaseUrl = project.findProperty("WORD_API_BASE_URL") ?: System.getenv("WORD_API_BASE_URL") ?: ""
def escapedWordApiBaseUrl = configuredWordApiBaseUrl
        .replace("\\", "\\\\")
        .replace("\"", "\\\"")
def configuredFirebaseWebApiKey = project.findProperty("FIREBASE_WEB_API_KEY") ?: System.getenv("FIREBASE_WEB_API_KEY") ?: ""
def escapedFirebaseWebApiKey = configuredFirebaseWebApiKey
        .replace("\\", "\\\\")
        .replace("\"", "\\\"")

android {
    namespace "com.teemocaption.enlearning"
    compileSdk 35

    buildFeatures {
        buildConfig true
    }

    defaultConfig {
        applicationId "com.teemocaption.enlearning"
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName "0.1.0"

        buildConfigField "String", "WORD_API_BASE_URL", "\"${escapedWordApiBaseUrl}\""
        buildConfigField "String", "FIREBASE_WEB_API_KEY", "\"${escapedFirebaseWebApiKey}\""
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation "com.tom-roush:pdfbox-android:2.0.27.0"
}

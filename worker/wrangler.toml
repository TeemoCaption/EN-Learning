name = "en-learning-dictionary"
main = "src/index.js"
compatibility_date = "2026-06-19"

workers_dev = true

[[d1_databases]]
binding = "DB"
database_name = "en_learning"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[vars]
CACHE_TTL_SECONDS = "1209600"
BATCH_LIMIT = "50"
GOOGLE_TRANSLATE_MONTHLY_LIMIT = "450000"
GOOGLE_TRANSLATE_EXAMPLE_LIMIT = "3"
